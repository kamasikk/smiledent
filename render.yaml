services:
  - type: web
    name: smiledent
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn smiledent.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SITE_URL
        value: "https://smiledent.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: smiledent-db
          property: connectionString

databases:
  - name: smiledent-db
    plan: free
